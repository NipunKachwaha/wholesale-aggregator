apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wholesale-ingress
  namespace: wholesale
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target:      /
    nginx.ingress.kubernetes.io/proxy-body-size:     "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout:  "60"
    nginx.ingress.kubernetes.io/enable-cors:         "true"
    nginx.ingress.kubernetes.io/cors-allow-methods:  "GET, POST, PUT, DELETE, OPTIONS"
spec:
  ingressClassName: nginx
  rules:
    - host: wholesale.local
      http:
        paths:
          - path:     /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 3000
          - path:     /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path:     /catalog
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 3002
          - path:     /graphql
            pathType: Prefix
            backend:
              service:
                name: graphql-service
                port:
                  number: 4000
          - path:     /ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8000
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80