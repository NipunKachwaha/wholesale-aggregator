apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: wholesale
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: wholesale-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu:    "250m"
            limits:
              memory: "1Gi"
              cpu:    "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds:       10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds:       30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: wholesale
spec:
  selector:
    app: ai-service
  ports:
    - port:       8000
      targetPort: 8000