apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: wholesale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 256mb
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key:  REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "200m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds:       5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: wholesale
spec:
  selector:
    app: redis
  ports:
    - port:       6379
      targetPort: 6379