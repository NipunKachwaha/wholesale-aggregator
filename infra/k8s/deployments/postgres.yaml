apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: wholesale
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name:  POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key:  POSTGRES_DB
            - name:  POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key:  POSTGRES_USER
            - name:  POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key:  POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu:    "250m"
            limits:
              memory: "512Mi"
              cpu:    "500m"
          volumeMounts:
            - name:      postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "wholesale_user"]
            initialDelaySeconds: 10
            periodSeconds:       5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "wholesale_user"]
            initialDelaySeconds: 30
            periodSeconds:       10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: wholesale
spec:
  selector:
    app: postgres
  ports:
    - port:       5432
      targetPort: 5432
  clusterIP: None